# values-secrets.yaml — sensitive overrides, NEVER commit
#
# Copy this file to values-secrets.yaml and fill in your values.
# values-secrets.yaml is gitignored and helmignored.
#
# Usage:
#   helm install earthgazer . -f values-prod.yaml -f values-secrets.yaml

## Google Cloud credentials
gcloud:
  ## Paste the full contents of your service-account.json here.
  ## Required IAM roles:
  ##   - roles/bigquery.jobUser on your GCP project (run discovery queries)
  ##   - roles/storage.objectAdmin on your GCS bucket (backup & retrieval)
  serviceAccount: |
    {
      "type": "service_account",
      "project_id": "YOUR_PROJECT_ID",
      "private_key_id": "...",
      "private_key": "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n",
      "client_email": "earthgazer-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com",
      "client_id": "...",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
  bucketName: "your-earthgazer-bucket"

## Database password
postgresql:
  auth:
    password: "change-me-strong-password"

## Redis password
redis:
  auth:
    password: "change-me-strong-password"

## Flower monitoring UI password
flower:
  auth:
    password: "change-me-strong-password"
